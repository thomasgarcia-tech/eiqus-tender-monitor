name: EIQUS Weekly Tender Monitor

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  scan-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run EIQUS Tender Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          RECIPIENT_EMAIL: thomas.garcia@eiqus.com
          SENDER_EMAIL: thomas.garcia@eiqus.com
        run: |
          SRCDIR=$(find . -name "main.py" | grep -v ".git" | head -1 | xargs dirname)
          echo "Found main.py in: $SRCDIR"
          cd "$SRCDIR"
          python main.py
